<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Zhang Matthew 知识库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Zhang Matthew的个人知识库 - 软件工程、投资、哲学">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b983;
      --theme-color-dark: #359469;
    }
    .sidebar {
      background: #f8f9fa;
    }
    .sidebar-nav li {
      margin: 0.2em 0;
    }
    .sidebar-nav a {
      color: #34495e;
      font-size: 14px;
    }
    .sidebar-nav a:hover {
      color: var(--theme-color);
    }
    .sidebar-nav .active {
      color: var(--theme-color);
      font-weight: 600;
    }
    .app-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #2c3e50;
    }
    .app-name-link img {
      max-width: 100%;
    }
    .markdown-section {
      max-width: 900px;
    }
    .markdown-section h1 {
      border-bottom: 2px solid var(--theme-color);
      padding-bottom: 0.3em;
    }
    .markdown-section h2 {
      border-left: 4px solid var(--theme-color);
      padding-left: 0.5em;
    }
    .markdown-section h3 {
      color: #34495e;
    }
    .markdown-section code {
      background: #f8f8f8;
      border-radius: 3px;
      padding: 0.2em 0.4em;
    }
    .markdown-section pre code {
      background: #2d2d2d;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Zhang Matthew 知识库',
      repo: 'Matthew55798/matthew55798.github.io',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'README.md',
      basePath: '/',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '未找到结果',
        depth: 6
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function (html) {
            return html
              .replace(/\[\[([^\]]+)\]\]/g, '<span class="highlight">$1</span>')
          })
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
