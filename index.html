<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Zhang Matthew 知识库</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Zhang Matthew的个人知识库 - 软件工程、投资、哲学">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//unpkg.com/docsify/lib/themes/vue.css">
</head>
<body>
    <div id="app"></div>

    <style type="text/css">
        .sidebar p.active {
            border-right: 2px solid;
            color: var(--theme-color, #42b983);
            font-weight: 600;
        }
    </style>

    <script>
        window.$docsify = {
            name: 'Zhang Matthew 知识库',
            repo: 'https://github.com/Matthew55798/matthew55798.github.io',
            loadSidebar: true,
            subMaxLevel: 3,
            autoHeader: true,
            coverpage: true,
            onlyCover: true,
            search: {
                paths: 'auto',
                placeholder: '🔍 搜索',
                noData: '未找到结果',
                depth: 6
            },
            copyCode: {
                buttonText: '复制',
                errorText: 'Error',
                successText: 'OK!'
            },
            pagination: {
                previousText: '上一篇',
                nextText: '下一篇'
            }
        }
    </script>

    <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
    <!-- 代码块复制插件 -->
    <script src="//unpkg.com/docsify-copy-code"></script>
    <!-- 搜索插件 -->
    <script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
    <!-- 语法高亮插件 -->
    <script src="//unpkg.com/prismjs/components/prism-java.min.js"></script>
    <script src="//unpkg.com/prismjs/components/prism-sql.min.js"></script>
    <script src="//unpkg.com/prismjs/components/prism-bash.min.js"></script>
    <!-- 分页插件 -->
    <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <!-- 统计访问量插件 -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
